site_name: 🛡️ SafeSpace Documentation
site_description: IoT 센서 시계열 분석 및 영상 이상행동 탐지 기반 조선소 밀폐공간 안전 모니터링 시스템
site_url: https://yeongseon.github.io/safespace/docs/
repo_url: https://github.com/yeongseon/safespace
repo_name: yeongseon/safespace

theme:
  name: material
  language: ko
  favicon: assets/favicon.svg
  logo: assets/favicon.svg
  palette:
    - scheme: default
      primary: white
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - scheme: slate
      primary: deep purple
      accent: green
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  font:
    text: Noto Sans KR
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.tabs.link
    - toc.follow
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

nav:
  - 🏠 홈: index.md
  - 🚀 시작하기:
      - 🚀 빠른 시작: getting-started.md
      - 🚢 배포 가이드: deployment.md
  - 📋 프로젝트:
      - 📝 제품 요구사항 (PRD): prd.md
      - 🎨 UX/UI 설계: ux-ui.md
  - 🏗️ 아키텍처:
      - 🏗️ 시스템 아키텍처: architecture.md
      - ⚙️ 기술 설계: tech.md
      - 🖥️ 프론트엔드 구조: frontend.md
      - ⚙️ 백엔드 구조: backend.md
      - 🌐 API 명세: api.md
      - 🗄️ 데이터 모델: data.md
  - 📊 운영:
      - ⚠️ 위험 판정 규칙: risk-rules.md
      - 🎮 데모 시나리오: demo.md
  - 📌 기타:
      - 🗺️ 개발 로드맵: roadmap.md
      - 🎤 발표 가이드: presentation.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yeongseon/safespace
